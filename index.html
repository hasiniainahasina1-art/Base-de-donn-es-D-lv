<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner code-barres PRO</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
body {
    font-family: system-ui;
    background: #f0f0f0;
    margin: 0;
    padding: 20px;
    text-align: center;
}

.container {
    max-width: 700px;
    margin: auto;
    background: white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

h1 {
    color: #1e3c72;
}

#reader {
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    background: black;
    margin-top: 10px;
}

#result {
    margin-top: 20px;
    padding: 12px;
    background: #eef2ff;
    border-radius: 12px;
}

button {
    margin-top: 15px;
    padding: 12px 20px;
    border-radius: 30px;
    border: none;
    background: #1e3c72;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #0f2b4f;
}
</style>
</head>

<body>

<div class="container">
    <h1>📷 Scanner (Caméra arrière)</h1>

    <div id="reader"></div>

    <div id="result">⏳ Initialisation...</div>

    <button id="restartBtn">🔄 Redémarrer</button>
</div>

<script>
let html5QrCode;
let isScanning = false;

const resultDiv = document.getElementById('result');

// ✅ Démarrer scanner caméra arrière uniquement
async function startScanner() {
    try {
        if (!html5QrCode) {
            html5QrCode = new Html5Qrcode("reader");
        }

        if (isScanning) {
            await html5QrCode.stop();
        }

        resultDiv.textContent = "📸 Activation caméra arrière...";

        await html5QrCode.start(
            { facingMode: "environment" }, // 🔥 caméra arrière uniquement
            {
                fps: 10,
                qrbox: { width: 250, height: 180 }
            },
            onScanSuccess
        );

        isScanning = true;
        resultDiv.textContent = "✅ Scanner actif (caméra arrière)";
    } catch (err) {
        console.error(err);
        resultDiv.textContent = "❌ Caméra arrière indisponible ou permission refusée.";
    }
}

// ✅ Scan réussi
function onScanSuccess(decodedText, decodedResult) {
    resultDiv.innerHTML =
        "✅ Code : <b>" + escapeHtml(decodedText) + "</b>";

    if (navigator.vibrate) navigator.vibrate(200);
}

// ✅ Stop scanner
async function stopScanner() {
    if (html5QrCode && isScanning) {
        await html5QrCode.stop();
        isScanning = false;
    }
}

// ✅ Sécurité (éviter HTML injection)
function escapeHtml(text) {
    return text.replace(/[&<>"']/g, function(m) {
        return ({
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#039;"
        })[m];
    });
}

// ✅ Bouton restart
document.getElementById("restartBtn").addEventListener("click", async () => {
    await stopScanner();
    startScanner();
});

// ✅ Lancement initial
startScanner();

</script>

</body>
</html>
