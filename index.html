<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner YAS PRO</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
:root{
    --blue:#0057b8;
    --yellow:#ffd100;
}

body{
    margin:0;
    font-family:system-ui;
    background:#f4f6fb;
}

.header{
    background:linear-gradient(135deg,var(--blue),#003d82);
    color:white;
    padding:15px;
    text-align:center;
    font-weight:bold;
}

.container{
    max-width:900px;
    margin:auto;
    padding:15px;
}

.card{
    background:white;
    border-radius:20px;
    padding:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    margin-bottom:15px;
}

#reader{
    width:100%;
    border-radius:15px;
    overflow:hidden;
    background:black;
    min-height:300px;
}

.status{
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    background:#eef2ff;
    font-weight:bold;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin-top:10px;
}

button{
    padding:10px;
    border:none;
    border-radius:20px;
    font-weight:bold;
    cursor:pointer;
}

.primary{background:var(--blue);color:white;}
.yellow{background:var(--yellow);}
.danger{background:#ff4d4d;color:white;}
.success{background:#2ecc71;color:white;}

.history{
    max-height:250px;
    overflow:auto;
}

.item{
    background:#f1f3f9;
    padding:8px;
    border-radius:8px;
    margin-bottom:5px;
    font-size:0.9rem;
}
</style>
</head>

<body>

<div class="header">📷 Scanner YAS PRO</div>

<div class="container">

<div class="card">
    <div id="reader"></div>
    <div id="status" class="status">⏳ Prêt à scanner</div>

    <div class="buttons">
        <button class="primary" id="startBtn">📷 Scanner</button>
        <button class="yellow" id="flashBtn">⚡ Flash</button>
        <button class="success" id="exportBtn">📤 Export</button>
        <button class="primary" id="copyBtn">📋 Copier</button>
        <button class="danger" id="clearBtn">🗑️ Clear</button>
        <button onclick="history.back()">⬅️ Retour</button>
    </div>
</div>

<div class="card">
    <b>Dernier scan :</b>
    <div id="lastScan">---</div>
</div>

<div class="card">
    <b>Historique :</b>
    <div id="history" class="history"></div>
</div>

</div>

<script>
let html5QrCode;
let isScanning=false;
let lastScan="";
let historyData = JSON.parse(localStorage.getItem("scans") || "[]");
let flashOn=false;

const statusEl = document.getElementById("status");
const historyEl = document.getElementById("history");

// 🔊 son
const beep = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

// sauvegarde
function saveHistory(){
    localStorage.setItem("scans", JSON.stringify(historyData));
}

// affichage historique
function updateHistory(){
    historyEl.innerHTML="";
    historyData.slice(0,50).forEach(item=>{
        let div=document.createElement("div");
        div.className="item";
        div.textContent=item;
        historyEl.appendChild(div);
    });
}
updateHistory();

// 🚀 démarrer scan
async function startScanner(){
    try{
        if(!html5QrCode){
            html5QrCode=new Html5Qrcode("reader");
        }

        if(isScanning){
            await html5QrCode.stop();
        }

        await html5QrCode.start(
            {facingMode:"environment"},
            {fps:15, qrbox:{width:250,height:180}},
            onScanSuccess
        );

        isScanning=true;
        statusEl.textContent="📸 Scanner actif";

    }catch(err){
        statusEl.textContent="❌ Erreur caméra";
        console.error(err);
    }
}

// ✅ scan réussi + STOP caméra
async function onScanSuccess(text){

    if(text===lastScan) return;
    lastScan=text;

    document.getElementById("lastScan").textContent=text;

    historyData.unshift(text);
    saveHistory();
    updateHistory();

    // 🔊 + 📳
    if(navigator.vibrate) navigator.vibrate(200);
    try{
        beep.currentTime=0;
        beep.play();
    }catch(e){}

    // 🛑 arrêter caméra
    if(html5QrCode && isScanning){
        await html5QrCode.stop();
        isScanning=false;
    }

    statusEl.textContent="✅ Scan terminé (appuie sur Scanner)";
}

// ⚡ flash
document.getElementById("flashBtn").onclick = async ()=>{
    try{
        flashOn=!flashOn;
        await html5QrCode.applyVideoConstraints({
            advanced:[{torch:flashOn}]
        });
    }catch(e){
        alert("Flash non supporté");
    }
};

// 📷 bouton scanner (manuel)
document.getElementById("startBtn").onclick = ()=>{
    startScanner();
};

// 📋 copier
document.getElementById("copyBtn").onclick=()=>{
    if(!lastScan) return;
    navigator.clipboard.writeText(lastScan);
    alert("Copié !");
};

// 🗑️ clear
document.getElementById("clearBtn").onclick=()=>{
    historyData=[];
    saveHistory();
    updateHistory();
};

// 📤 export CSV
document.getElementById("exportBtn").onclick=()=>{
    let csv="Code\n";
    historyData.forEach(c=> csv+=c+"\n");

    let blob=new Blob([csv],{type:"text/csv"});
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="scans.csv";
    a.click();
};
</script>

</body>
</html>
